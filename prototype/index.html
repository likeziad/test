<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذائقتي - للأسر المنتجة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="device-mockup">
        <div class="app-container">
            <!-- Header -->
            <header class="app-header">
                <div class="header-content">
                    <div class="user-greeting">
                        <img src="https://i.pravatar.cc/150?img=32" alt="User" class="avatar">
                        <div class="greeting-text">
                            <span>مرحباً بك،</span>
                            <h1>حسين علي</h1>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="icon-btn notification-btn">
                            <i class="fas fa-bell"></i>
                            <span class="badge">3</span>
                        </button>
                    </div>
                </div>

                <!-- Search Bar -->
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" placeholder="ابحث عن وجبات، أسر منتجة..." class="search-input">
                    <button class="filter-btn"><i class="fas fa-sliders-h"></i></button>
                </div>
            </header>

            <!-- Main Content Area -->
            <main class="app-main" id="main-content">
                <!-- Categories -->
                <section class="categories-section">
                    <div class="section-header">
                        <h2>التصنيفات</h2>
                        <a href="#" class="see-all">عرض الكل</a>
                    </div>
                    <div class="categories-scroll">
                        <div class="category-chip active">الكل</div>
                        <div class="category-chip">وجبات رئيسية</div>
                        <div class="category-chip">حلويات</div>
                        <div class="category-chip">مخبوزات</div>
                        <div class="category-chip">مشروبات</div>
                    </div>
                </section>

                <!-- Popular Meals -->
                <section class="meals-section">
                    <div class="section-header">
                        <h2>الأكثر طلباً</h2>
                    </div>
                    <div class="meals-list" id="meals-list">
                        <!-- Meals will be injected by JS -->
                    </div>
                </section>
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <a href="#" class="nav-item active" data-tab="home">
                    <i class="fas fa-home"></i>
                    <span>الرئيسية</span>
                </a>
                <a href="#" class="nav-item" data-tab="orders">
                    <i class="fas fa-receipt"></i>
                    <span>طلباتي</span>
                </a>
                <a href="#" class="nav-item cart-nav" data-tab="cart">
                    <div class="cart-icon-wrapper">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge">2</span>
                    </div>
                </a>
                <a href="#" class="nav-item" data-tab="wallet">
                    <i class="fas fa-wallet"></i>
                    <span>المحفظة</span>
                </a>
                <a href="#" class="nav-item" data-tab="profile">
                    <i class="fas fa-user"></i>
                    <span>حسابي</span>
                </a>
            </nav>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
